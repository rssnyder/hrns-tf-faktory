template:
  name: ${TEMPLATE_NAME}
  identifier: ${TEMPLATE_IDENTIFIER}
  versionLabel: ${TEMPLATE_VERSION}
  type: Stage
  comments: ${TEMPLATE_COMMENTS}
  tags:
    ${indent(4, TAGS)}
  spec:
    type: IACM
    spec:
${IACM_STAGE_INFRASTRUCTURE}
      workspace: <+input>
      execution:
        steps:
          - step:
${TF_STEP}
              name: init
              identifier: init
              timeout: 10m
              spec:
                command: init
          - step:
${TF_STEP}
              name: detect drift
              identifier: detect_drift
              timeout: 10m
              spec:
                command: detect-drift